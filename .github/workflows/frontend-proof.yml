name: frontend-proof

on:
  push:
    paths:
      - ".github/workflows/frontend-proof.yml"
      - "BOOTSTRAP.md"
      - "Makefile"
      - "backend/**"
      - "contract/**"
      - "docs/**"
      - "frontend/**"
      - "hca/**"
      - "memory_service/**"
      - "README.md"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/frontend-proof.yml"
      - "BOOTSTRAP.md"
      - "Makefile"
      - "backend/**"
      - "contract/**"
      - "docs/**"
      - "frontend/**"
      - "hca/**"
      - "memory_service/**"
      - "README.md"
      - "scripts/**"
  workflow_dispatch:

jobs:
  frontend-proof:
    name: Frontend Proof
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements-core.txt
            backend/requirements-integration.txt
            backend/requirements.txt
            backend/requirements-test.txt
            hca/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Run repo integrity sentinel
        run: python scripts/check_repo_integrity.py
      - name: Bootstrap test environment
        run: |
          python -m pip install --upgrade pip
          make venv
      - name: Install frontend dependencies
        run: make test-bootstrap-frontend
      - name: Run frontend proof
        run: make proof-frontend
      - name: Print frontend proof summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("artifacts/proof/frontend.json")
          if not path.exists():
              raise SystemExit("frontend receipt missing")
          payload = json.loads(path.read_text(encoding="utf-8"))
          print(
              f"frontend outcome={payload['outcome']} passed={payload['passed_test_count']} skipped={payload['skipped_test_count']} failed={payload['failed_test_count']} errors={payload['error_test_count']}"
          )
          PY
      - name: Upload frontend proof receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-proof-receipt
          path: artifacts/proof/frontend.json
          if-no-files-found: error
